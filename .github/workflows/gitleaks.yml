name: Gitleaks - Secret Scanning

on:
  push:
    branches: ["develop", "staging", "main"]
  pull_request:
    branches: ["develop", "staging", "main"]

jobs:
  gitleaks:
    name: Scan for secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          ARCH=$(uname -m | sed 's/x86_64/x64/;s/aarch64/arm64/')
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_${ARCH}.tar.gz" \
            | tar -xz -C /usr/local/bin

      - name: Run Gitleaks (verbose — shows each leak in logs)
        run: |
          gitleaks detect \
            --source . \
            --report-format json \
            --report-path gitleaks-results.json \
            --exit-code 1 \
            --verbose || LEAK_EXIT=$?

          if [ -f gitleaks-results.json ] && [ "$(cat gitleaks-results.json)" != "[]" ]; then
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🔴 GITLEAKS — SECRETS DETECTED"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            cat gitleaks-results.json | python3 -c "
import json, sys
findings = json.load(sys.stdin)
for i, f in enumerate(findings, 1):
    print(f\"\n[{i}] Rule      : {f.get('RuleID','')}\")
    print(f\"    File      : {f.get('File','')}\")
    print(f\"    Line      : {f.get('StartLine','')}\")
    print(f\"    Commit    : {f.get('Commit','')[:10]}\")
    print(f\"    Secret    : {f.get('Secret','')[:6]}{'*' * max(0, len(f.get('Secret','')) - 6)}\")
print(f\"\nTotal leaks found: {len(findings)}\")
"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          fi

          exit ${LEAK_EXIT:-0}

      - name: Upload findings as artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-results
          path: gitleaks-results.json
