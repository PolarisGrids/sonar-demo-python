name: Gitleaks - Full History Scan

on:
  # Run every Monday at 8AM IST (2:30 AM UTC)
  schedule:
    - cron: "30 2 * * 1"
  # Allow manual trigger anytime
  workflow_dispatch:

jobs:
  gitleaks-history:
    name: Scan full git history
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          ARCH=$(uname -m | sed 's/x86_64/x64/;s/aarch64/arm64/')
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_${ARCH}.tar.gz" \
            | tar -xz -C /usr/local/bin

      - name: Scan full git history
        run: |
          gitleaks detect \
            --source . \
            --report-format json \
            --report-path gitleaks-history.json \
            --verbose || true

      - name: Show history scan results
        run: |
          python3 << 'PYEOF'
          import json, sys, os

          RESET   = "\033[0m"
          BOLD    = "\033[1m"
          NAVY    = "\033[38;5;25m"
          ORANGE  = "\033[38;5;208m"
          RED     = "\033[38;5;196m"
          WHITE   = "\033[97m"
          GRAY    = "\033[38;5;245m"
          BG_NAVY = "\033[48;5;17m"
          GREEN   = "\033[38;5;40m"

          path = "gitleaks-history.json"
          if not os.path.exists(path):
              sys.exit(0)
          with open(path) as f:
              findings = json.load(f)

          W = 62
          print()
          print(f"{BG_NAVY}{WHITE}{BOLD}{'':^{W}}{RESET}")
          print(f"{BG_NAVY}{WHITE}{BOLD}{'POLARIS GRIDS â€” SECRETS DETECTION':^{W}}{RESET}")
          print(f"{BG_NAVY}{WHITE}{BOLD}{'Full Repository History Scan':^{W}}{RESET}")
          print(f"{BG_NAVY}{WHITE}{BOLD}{'':^{W}}{RESET}")
          print()

          if not findings:
              print(f"  {GREEN}{BOLD}âś”  No secrets found in git history. Repository is clean.{RESET}")
              print()
              sys.exit(0)

          print(f"{RED}{BOLD}  âś–  {len(findings)} SECRET(S) FOUND IN GIT HISTORY{RESET}")
          print(f"{NAVY}{'â”€' * W}{RESET}")
          print()

          # Group by file for easier remediation
          by_file = {}
          for f in findings:
              key = f.get("File", "unknown")
              by_file.setdefault(key, []).append(f)

          for i, (finding) in enumerate(findings, 1):
              secret = finding.get("Secret", "")
              masked = secret[:4] + "â—Ź" * min(12, max(4, len(secret) - 4)) + "  [REDACTED]"
              print(f"  {ORANGE}{BOLD}Finding #{i}{RESET}")
              print(f"  {GRAY}Rule    {RESET}  {WHITE}{finding.get('RuleID', '')}{RESET}")
              print(f"  {GRAY}File    {RESET}  {WHITE}{finding.get('File', '')}{RESET}  {GRAY}line {finding.get('StartLine', '')}{RESET}")
              print(f"  {GRAY}Commit  {RESET}  {WHITE}{finding.get('Commit', '')[:10]}{RESET}  {GRAY}{finding.get('Date', '')[:10]}{RESET}")
              print(f"  {GRAY}Author  {RESET}  {WHITE}{finding.get('Author', '')}{RESET}")
              print(f"  {GRAY}Secret  {RESET}  {RED}{masked}{RESET}")
              print()

          print(f"{NAVY}{'â”€' * W}{RESET}")
          print(f"  {RED}{BOLD}{len(findings)} secret(s) found in git history.{RESET}")
          print()
          print(f"  {ORANGE}Required actions:{RESET}")
          print(f"  {GRAY}1. Rotate ALL exposed credentials immediately{RESET}")
          print(f"  {GRAY}2. Purge from git history: git-filter-repo --sensitive-data-removal{RESET}")
          print(f"  {GRAY}3. Force push cleaned history (coordinate with team){RESET}")
          print(f"  {GRAY}4. Move all secrets to AWS Secrets Manager or SSM{RESET}")
          print()
          PYEOF

      - name: Notify Teams on secrets found
        if: always()
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request, urllib.error

          path = "gitleaks-history.json"
          if not os.path.exists(path):
              print("No results file found â€” skipping Teams notification")
              exit(0)

          with open(path) as f:
              findings = json.load(f)

          webhook_url = os.environ.get("TEAMS_WEBHOOK_URL", "")
          if not webhook_url:
              print("No TEAMS_WEBHOOK_URL set â€” skipping notification")
              exit(0)

          repo     = os.environ.get("GITHUB_REPOSITORY", "")
          run_id   = os.environ.get("GITHUB_RUN_ID", "")
          server   = os.environ.get("GITHUB_SERVER_URL", "https://github.com")
          run_url  = f"{server}/{repo}/actions/runs/{run_id}"
          date     = os.environ.get("GITHUB_RUN_STARTED_AT", "")[:10]

          if not findings:
              payload = {
                  "type": "message",
                  "attachments": [{
                      "contentType": "application/vnd.microsoft.card.adaptive",
                      "content": {
                          "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                          "type": "AdaptiveCard",
                          "version": "1.4",
                          "body": [
                              {"type": "TextBlock", "text": "POLARIS GRIDS â€” SECRETS DETECTION", "weight": "Bolder", "size": "Medium", "color": "Accent"},
                              {"type": "TextBlock", "text": "âś…  No secrets found in git history. Repository is clean.", "color": "Good", "wrap": True},
                              {"type": "FactSet", "facts": [
                                  {"title": "Repository", "value": repo},
                                  {"title": "Scan Date", "value": date}
                              ]}
                          ],
                          "actions": [{"type": "Action.OpenUrl", "title": "View Run", "url": run_url}]
                      }
                  }]
              }
          else:
              top5 = findings[:5]
              facts = [{"title": f"#{i+1} {f.get('RuleID','')}", "value": f"{f.get('File','')} Â· line {f.get('StartLine','')} Â· commit {f.get('Commit','')[:8]} Â· {f.get('Author','')}"}
                       for i, f in enumerate(top5)]
              if len(findings) > 5:
                  facts.append({"title": "...", "value": f"and {len(findings) - 5} more. See GitHub Issue for full list."})

              payload = {
                  "type": "message",
                  "attachments": [{
                      "contentType": "application/vnd.microsoft.card.adaptive",
                      "content": {
                          "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                          "type": "AdaptiveCard",
                          "version": "1.4",
                          "body": [
                              {"type": "TextBlock", "text": "POLARIS GRIDS â€” SECRETS DETECTION", "weight": "Bolder", "size": "Medium", "color": "Attention"},
                              {"type": "TextBlock", "text": f"đź”´  {len(findings)} secret(s) found in git history of **{repo}**", "color": "Attention", "weight": "Bolder", "wrap": True},
                              {"type": "TextBlock", "text": "Findings", "weight": "Bolder", "spacing": "Medium"},
                              {"type": "FactSet", "facts": facts},
                              {"type": "TextBlock", "text": "âš ď¸Ź Rotate exposed credentials immediately and purge from git history using BFG Repo Cleaner.", "wrap": True, "color": "Warning", "spacing": "Medium"}
                          ],
                          "actions": [
                              {"type": "Action.OpenUrl", "title": "View GitHub Issue", "url": f"{server}/{repo}/issues"},
                              {"type": "Action.OpenUrl", "title": "View Actions Run", "url": run_url}
                          ]
                      }
                  }]
              }

          data = json.dumps(payload).encode("utf-8")
          req  = urllib.request.Request(webhook_url, data=data, headers={"Content-Type": "application/json"})
          try:
              with urllib.request.urlopen(req, timeout=10) as resp:
                  print(f"Teams notification sent â€” status {resp.status}")
          except urllib.error.HTTPError as e:
              print(f"Teams notification failed: {e.code} {e.reason}")
          except Exception as e:
              print(f"Teams notification error: {e}")
          PYEOF
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}

      - name: Upload full history report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-history-report
          path: gitleaks-history.json
          retention-days: 30

      - name: Open GitHub Issue with auto-assign if secrets found
        if: always()
        uses: actions/github-script@v7
        env:
          SECURITY_OWNER: ${{ secrets.SECURITY_OWNER }}
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('gitleaks-history.json')) return;
            const findings = JSON.parse(fs.readFileSync('gitleaks-history.json'));
            if (!findings || findings.length === 0) {
              console.log('No secrets found â€” skipping issue creation');
              return;
            }

            // Resolve GitHub username via commit SHA â€” works regardless of email privacy
            const commitSHAs = [...new Set(findings.map(f => f.Commit).filter(Boolean))];
            const assignees = [];

            for (const sha of commitSHAs) {
              try {
                const res = await github.rest.repos.getCommit({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: sha
                });
                const login = res.data.author?.login;
                if (login) {
                  assignees.push(login);
                  console.log(`Resolved commit ${sha.substring(0,8)} â†’ @${login}`);
                } else {
                  console.log(`Commit ${sha.substring(0,8)} has no linked GitHub account`);
                }
              } catch (e) {
                console.log(`Could not resolve commit ${sha.substring(0,8)}: ${e.message}`);
              }
            }

            // Fallback to security owner if original author left org or account deleted
            const SECURITY_OWNER = process.env.SECURITY_OWNER || '';
            let uniqueAssignees = [...new Set(assignees)].slice(0, 10);
            if (uniqueAssignees.length === 0 && SECURITY_OWNER) {
              uniqueAssignees = [SECURITY_OWNER];
              console.log(`No assignees resolved â€” falling back to @${SECURITY_OWNER}`);
            }
            const assigneeText = uniqueAssignees.length > 0
              ? uniqueAssignees.map(a => `@${a}`).join(', ')
              : 'Could not auto-resolve â€” please assign manually';

            const body = `## ${findings.length} Secret(s) Found in Git History\n\n` +
                         `**Last scan:** ${new Date().toISOString().split('T')[0]}\n` +
                         `**Auto-assigned to:** ${assigneeText}\n\n` +
                         `| # | Rule | File | Line | Commit | Author | Date |\n` +
                         `|---|---|---|---|---|---|---|\n` +
                         findings.map((f, i) =>
                           `| ${i+1} | ${f.RuleID} | ${f.File} | ${f.StartLine} | ${f.Commit?.substring(0,8)} | ${f.Author} | ${f.Date?.substring(0,10)} |`
                         ).join('\n') +
                         `\n\n## Remediation Steps\n` +
                         `1. **Rotate credentials immediately** â€” assume the secret is already compromised\n` +
                         `2. **Purge from git history** â€” run BFG Repo Cleaner:\n` +
                         `   \`\`\`bash\n` +
                         `   echo "YOUR_SECRET_VALUE" > secrets.txt\n` +
                         `   bfg --replace-text secrets.txt\n` +
                         `   git reflog expire --expire=now --all && git gc --prune=now --aggressive\n` +
                         `   git push --force\n` +
                         `   \`\`\`\n` +
                         `3. **Force push cleaned history** â€” coordinate with the team before doing this\n` +
                         `4. **Move secret to AWS Secrets Manager** â€” never hardcode credentials again:\n` +
                         `   \`\`\`bash\n` +
                         `   aws secretsmanager create-secret \\\n` +
                         `     --name "/gomati/stage/<service>/<secret-name>" \\\n` +
                         `     --secret-string "YOUR_ACTUAL_SECRET_VALUE" \\\n` +
                         `     --region ap-south-1\n` +
                         `   \`\`\`\n` +
                         `   Then reference it in your code:\n` +
                         `   \`\`\`python\n` +
                         `   import boto3\n` +
                         `   client = boto3.client("secretsmanager", region_name="ap-south-1")\n` +
                         `   secret = client.get_secret_value(SecretId="/gomati/stage/<service>/<secret-name>")\n` +
                         `   \`\`\`\n\n` +
                         `> âš ď¸Ź This issue is auto-updated every Monday. A comment will be added each week until the history is clean.`;

            // Check if issue already exists â€” update instead of creating duplicate
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'gitleaks-history'
            });

            if (issues.data.length > 0) {
              console.log(`Updating existing issue #${issues.data[0].number}`);
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body,
                assignees: uniqueAssignees
              });
              // Add a comment to re-notify assignees
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body: `đź”„ **Weekly scan update â€” ${new Date().toISOString().split('T')[0]}**\n\n` +
                      `${findings.length} secret(s) still found in git history.\n\n` +
                      `${uniqueAssignees.map(a => `@${a}`).join(' ')} â€” this is a reminder to:\n` +
                      `1. Rotate the exposed credential\n` +
                      `2. Purge it from git history using BFG\n` +
                      `3. Move it to AWS Secrets Manager (\`/gomati/stage/<service>/<name>\`)`
              });
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `đź”´ [Gitleaks History] ${findings.length} secret(s) found in git history`,
              body,
              labels: ['security', 'gitleaks-history'],
              assignees: uniqueAssignees
            });
